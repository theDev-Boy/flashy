name: flashy
description: "Flashy - Your files. Lightning fast."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase Auth
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0

  # Google Drive
  googleapis: ^16.0.0

  # File System
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  file_picker: ^11.0.2
  open_file: ^3.5.11
  share_plus: ^13.1.0
  archive: ^4.0.9

  # Local Cache
  sqflite: ^2.4.2
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.0

  # UI & Animation
  animations: ^2.2.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.3
  shimmer: ^3.0.0
  modal_bottom_sheet: ^3.0.0

  # Utilities
  intl: ^0.20.2
  mime: ^2.0.0
  connectivity_plus: ^7.1.1
  flutter_local_notifications: ^18.0.1
  wakelock_plus: ^1.6.1
  cached_network_image: ^3.4.1
  path: ^1.9.1

  # State Management & Routing
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  flutter_highlight: ^0.7.0
  video_player: ^2.11.1
  audioplayers: ^6.6.0
  url_launcher: ^6.3.2

dependency_overrides:
  win32: 6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/lottie/
    - lib/assets/icons/
